<svg xmlns="http://www.w3.org/2000/svg" width="1242" height="1660" viewBox="0 0 1242 1660">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff6f2"/>
      <stop offset="100%" stop-color="#ffe9df"/>
    </linearGradient>
    <style>
      .title{font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;font-size:88px;font-weight:700;fill:#1b313c}
      .sub{font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;font-size:34px;fill:#8c6b60}
      .tag{font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;font-size:28px;fill:#9c4f34}
    </style>
  </defs>
  <rect width="1242" height="1660" fill="url(#bg)"/>
  <rect x="74" y="72" width="1094" height="1516" rx="38" fill="#fffdfb" stroke="#f7d9ca"/>
  <text x="116" y="262" class="title">AI居然真的</text>
  <text x="116" y="372" class="title">帮我把简历</text>
  <text x="116" y="482" class="title">改顺了</text>
  <text x="116" y="612" class="sub">不会写 Boss 打招呼语的人真的会被救到</text>
  <rect x="116" y="760" width="240" height="60" rx="30" fill="#fff1ea" stroke="#f1c9b8"/>
  <text x="164" y="800" class="tag">简历表达</text>
  <rect x="380" y="760" width="240" height="60" rx="30" fill="#fff1ea" stroke="#f1c9b8"/>
  <text x="414" y="800" class="tag">AI求职工具</text>
  <rect x="644" y="760" width="240" height="60" rx="30" fill="#fff1ea" stroke="#f1c9b8"/>
  <text x="694" y="800" class="tag">真实体验</text>

  <rect x="116" y="940" width="1010" height="420" rx="30" fill="#fff6f2" stroke="#f3ddd2"/>
  <text x="156" y="1028" class="sub">• 不是简单润色，是帮你把经历说清楚</text>
  <text x="156" y="1112" class="sub">• Boss 打招呼语终于不像群发了</text>
  <text x="156" y="1196" class="sub">• 适合“做过事但不会包装自己”的人</text>
</svg>
